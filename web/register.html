<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>注册 - Dextro AI</title>
<style>
    body { background: #020617; color: white; font-family: system-ui; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
    .card { background: #0f172a; padding: 40px; border-radius: 20px; border: 1px solid #1e293b; width: 300px; box-shadow: 0 20px 25px rgba(0,0,0,0.5); }
    h2 { color: #f43f5e; text-align: center; margin-bottom: 25px; }
    input { width: 100%; padding: 12px; margin: 10px 0; background: #1e293b; border: 1px solid #334155; border-radius: 8px; color: white; box-sizing: border-box; }
    button { width: 100%; padding: 12px; margin-top: 15px; background: #f43f5e; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; color: white; }
</style></head>
<body>
    <div class="card">
        <h2>创建管理员账号</h2>
        <form method="post"><input name="username" placeholder="设置用户名" required><input name="password" type="password" placeholder="设置密码" required><button>立即激活系统</button></form>
        <p style="text-align:center; font-size:12px; margin-top:15px;"><a href="/login" style="color:#f43f5e; text-decoration:none;">返回登录</a></p>
    </div>
</body>
</html>
