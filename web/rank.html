<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>排行榜 - 大乐透 AI</title>
<style>
    body { background: #020617; color: white; font-family: system-ui; padding: 20px; }
    .container { max-width: 600px; margin: auto; background: #0f172a; padding: 30px; border-radius: 20px; border: 1px solid #1e293b; }
    h2 { color: #22d3ee; text-align: center; margin-bottom: 30px; }
    .row { display: flex; justify-content: space-between; padding: 15px; border-bottom: 1px solid #1e293b; }
    .back { display: block; text-align: center; margin-top: 20px; color: #22d3ee; text-decoration: none; font-size: 14px; }
</style></head>
<body>
    <div class="container">
        <h2>🏆 命中贡献排行榜</h2>
        {% for r in rows %}
        <div class="row">
            <span>{{ loop.index }}. {{ r[0] }}</span>
            <span style="color:#22d3ee; font-family:monospace;">{{ "%.2f"|format(r[1]) }} ({{ r[2] }}次)</span>
        </div>
        {% endfor %}
        <a href="/" class="back">← 返回神经决策系统</a>
    </div>
</body>
</html>
