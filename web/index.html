<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DEXTRO AI - 大乐透智慧预测系统</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { 
            --bg: #0b0f1a; --card: rgba(30, 41, 59, 0.7); 
            --cyan: #22d3ee; --pink: #f43f5e; --yellow: #facc15; 
            --border: rgba(255, 255, 255, 0.1); 
        }
        body { 
            background: radial-gradient(circle at top, #1e293b 0%, #0b0f1a 100%); 
            color: #e2e8f0; font-family: 'Inter', system-ui, -apple-system, sans-serif; 
            margin: 0; padding: 15px; min-height: 100vh;
        }
        .container { max-width: 1440px; margin: 0 auto; }
        
        /* 导航头 */
        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; padding: 10px 0; }
        .logo { font-size: 24px; font-weight: 800; letter-spacing: -1px; background: linear-gradient(to right, var(--cyan), var(--pink)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .nav-links a { color: #94a3b8; text-decoration: none; font-size: 14px; margin-left: 20px; transition: 0.3s; padding: 5px 12px; border-radius: 8px; }
        .nav-links a:hover { background: rgba(255,255,255,0.05); color: var(--cyan); }

        /* 布局网格 */
        .dashboard { display: grid; grid-template-columns: 1fr 320px; gap: 20px; }
        .card { 
            background: var(--card); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--border); border-radius: 20px; 
            padding: 24px; box-shadow: 0 15px 35px rgba(0,0,0,0.4);
        }

        /* 预测球样式 */
        .predict-box { text-align: center; padding: 20px 0; }
        .ball-l { 
            display: inline-flex; align-items: center; justify-content: center; 
            width: 46px; height: 46px; border-radius: 12px; margin: 5px; 
            font-weight: 800; font-size: 20px; border: 2px solid transparent;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        .red-l { background: rgba(244,63,94,0.1); color: var(--pink); border-color: rgba(244,63,94,0.3); }
        .blue-l { background: rgba(34,211,238,0.1); color: var(--cyan); border-color: rgba(34,211,238,0.3); }
        
        /* 走势图矩阵 */
        .zs-wrapper { overflow-x: auto; margin-top: 15px; border-radius: 12px; border: 1px solid var(--border); background: rgba(15, 23, 42, 0.5); }
