<html>
<head>
<style>
body{background:#0f172a;color:#fff;text-align:center;font-family:Arial;}
.ball{padding:10px;border-radius:50%;margin:5px;display:inline-block;}
.red{background:#ef4444;}
.blue{background:#3b82f6;}
.card{background:#1e293b;margin:20px;padding:20px;border-radius:12px;}
</style>
</head>

<body>

<h1>🎯 大乐透开奖 V41（真实数据）</h1>

<div class="card">
<h3>📅 期号：{{data.period}}</h3>
<p>开奖日期：{{data.date}}</p>

<p>前区：</p>
{% for n in data.red %}
<span class="ball red">{{n}}</span>
{% endfor %}

<p>后区：</p>
{% for n in data.blue %}
<span class="ball blue">{{n}}</span>
{% endfor %}
</div>

</body>
</html>
