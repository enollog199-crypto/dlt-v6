<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Dextro AI V63</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{background:#020617;color:#fff;font-family:Arial;padding:20px;}
.card{background:#111827;padding:20px;border-radius:12px;margin-bottom:20px;}
.ball{display:inline-block;margin:5px;padding:8px;border-radius:8px;font-weight:bold;}
.red{color:#f43f5e;border:1px solid #f43f5e;}
.blue{color:#22d3ee;border:1px solid #22d3ee;}
</style>
</head>

<body>

<h2>🎯 Dextro AI V63（信任版）</h2>

<div class="card">
<h3>🔮 下期预测（{{records[0].period}}）</h3>

{% for n in records[0].red %}
<span class="ball red">{{n}}</span>
{% endfor %}
|
{% for n in records[0].blue %}
<span class="ball blue">{{n}}</span>
{% endfor %}

<p>📊 置信度：{{records[0].conf}}%</p>
<p>🧠 AI判断：{{records[0].exp}}</p>
</div>

<div class="card">
<h3>📈 命中走势</h3>
<canvas id="c"></canvas>
</div>

<div class="card">
<h3>🔥 热点Top10</h3>
{% for n,v in top_numbers %}
<div>{{n}} → {{v}}</div>
{% endfor %}
</div>

<script>
new Chart(document.getElementById("c"),{
type:"line",
data:{
labels:{{chart_data.labels|tojson}},
datasets:[{data:{{chart_data.values|tojson}},borderWidth:2}]
}
});
</script>

</body>
</html>
