<html>
<head>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
body{background:#0f172a;color:#fff;text-align:center;}
.ball{padding:10px;border-radius:50%;margin:5px;}
.red{background:#ef4444;}
.blue{background:#3b82f6;}
</style>
</head>

<body>

<h1>🎯 大乐透AI V39</h1>

<a href="/rank">🏆 排行榜</a>

<h3>最新开奖</h3>
{% for n in data.latest.red %}
<span class="ball red">{{n}}</span>
{% endfor %}
|
{% for n in data.latest.blue %}
<span class="ball blue">{{n}}</span>
{% endfor %}

<h3>AI预测</h3>
{% for n in data.predict.red %}
<span class="ball red">{{n}}</span>
{% endfor %}
|
{% for n in data.predict.blue %}
<span class="ball blue">{{n}}</span>
{% endfor %}

<p>命中：{{data.predict.hit.red}} + {{data.predict.hit.blue}}</p>

<canvas id="chart"></canvas>

<script>
new Chart(document.getElementById("chart"), {
    type: 'line',
    data: {
        labels: ["1","2","3","4","5"],
        datasets: [{
            label: "命中趋势",
            data: [1,2,3,2,4]
        }]
    }
});
</script>

</body>
</html>
