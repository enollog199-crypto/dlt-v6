<div class="header">
    {% if user %}
        <div>欢迎, {{ user.username }} | 💰 虚拟余额: {{ user.balance }}</div>
        <a href="/logout" style="color:var(--pink)">退出</a>
    {% else %}
        <form action="/login" method="post" style="display:inline;">
            <input type="text" name="username" placeholder="账号">
            <input type="password" name="password" placeholder="密码">
            <button type="submit">登录</button>
        </form>
        <button onclick="document.getElementById('reg_m').style.display='block'">注册</button>
    {% endif %}
</div>

{% if user %}
<div class="ai-panel" style="border-color: var(--amber);">
    <h3 style="color:var(--amber)">🎮 虚拟投注模拟器</h3>
    <p style="font-size:11px; color:gray;">⚠️ 法律声明：本功能仅供数学概率研究，所有资金均为虚拟点数，不具货币价值。</p>
    <div id="bet-area">
        <p>投注期号：{{ last.p|int + 1 }}</p>
        <button onclick="submitBet()">点击投注当前 AI 预测号码 (2 虚拟币)</button>
    </div>
</div>

<script>
function submitBet() {
    // 获取当前 AI 推荐的号码（从页面获取或重新传入）
    const betData = {
        period: "{{ last.p }}",
        reds: [{{ reds|join(',') }}],
        blues: [{{ blues|join(',') }}],
        amount: 2.0
    };
    fetch('/bet', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify(betData)
    }).then(res => res.json()).then(data => {
        alert(data.msg);
        location.reload();
    });
}
</script>
{% endif %}
