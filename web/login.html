<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - Dextro AI</title>
    <style>
        body { 
            background: #020617; 
            color: white; 
            font-family: 'Segoe UI', system-ui; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            margin: 0; 
        }
        .card { 
            background: #0f172a; 
            padding: 40px; 
            border-radius: 20px; 
            border: 1px solid #1e293b; 
            width: 320px; 
            box-shadow: 0 20px 25px rgba(0,0,0,0.5); 
        }
        h2 { color: #22d3ee; text-align: center; margin-bottom: 25px; letter-spacing: 1px; }
        input { 
            width: 100%; 
            padding: 12px; 
            margin: 10px 0; 
            background: #1e293b; 
            border: 1px solid #334155; 
            border-radius: 8px; 
            color: white; 
            box-sizing: border-box; 
            transition: 0.3s;
        }
        input:focus { border-color: #22d3ee; outline: none; background: #111827; }
        button { 
            width: 100%; 
            padding: 12px; 
            margin-top: 20px; 
            background: #22d3ee; 
            border: none; 
            border-radius: 8px; 
            font-weight: bold; 
            color: #020617;
            cursor: pointer; 
            transition: 0.3s;
        }
        button:hover { background: #06b6d4; transform: translateY(-2px); }
        .link { text-align: center; margin-top: 20px; font-size: 13px; color: #64748b; }
        a { color: #22d3ee; text-decoration: none; font-weight: bold; }
        a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="card">
        <h2>Dextro AI LOGIN</h2>
        <form method="post">
            <input name="username" placeholder="用户名" required>
            <input name="password" type="password" placeholder="密码" required>
            <button type="submit">进入控制台</button>
        </form>
        <div class="link">还没有访问权限？<a href="/register">申请账号</a></div>
    </div>
</body>
</html>
